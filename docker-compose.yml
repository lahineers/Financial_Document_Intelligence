services:

  backend:

    build: .

    container_name: docintelli-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres

    volumes:
      - .:/app

    command: >
      uv run uvicorn app:app
      --host 0.0.0.0
      --port 8000
      --reload

  postgres:

    image: pgvector/pgvector:pg17

    container_name: postgres-db

    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: Nihal37307
      POSTGRES_DB: mydatabase

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

volumes:

  postgres-data: